name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly security scan

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: -Xmx2g

jobs:
  # ==========================================
  # Job 1: Code Quality and Static Analysis
  # ==========================================
  code-quality:
    name: Code Quality & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for SonarQube

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and Analyze with SonarQube
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B clean verify sonar:sonar \
            -Dsonar.projectKey=temperature-proxy-api \
            -Dsonar.organization=${{ github.repository_owner }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.java.coveragePlugin=jacoco \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: Run Checkstyle
        run: |
          mvn -B checkstyle:check \
            -Dcheckstyle.config.location=google_checks.xml \
            -Dcheckstyle.consoleOutput=true

      - name: Run SpotBugs
        run: mvn -B spotbugs:check

      - name: Upload Static Analysis Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: static-analysis-results
          path: |
            target/checkstyle-result.xml
            target/spotbugsXml.xml

  # ==========================================
  # Job 2: Unit Tests with Coverage
  # ==========================================
  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run Unit Tests
        run: |
          mvn -B clean test \
            -Dtest='*Test,!*IntegrationTest' \
            -DfailIfNoTests=true

      - name: Generate Coverage Report
        run: mvn -B jacoco:report

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: true
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            target/surefire-reports/
            target/site/jacoco/

  # ==========================================
  # Job 3: Integration Tests
  # ==========================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run Integration Tests
        run: |
          mvn -B clean verify \
            -Dtest='*IntegrationTest' \
            -DfailIfNoTests=false

      - name: Publish Integration Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Tests
          path: target/failsafe-reports/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload Integration Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: target/failsafe-reports/

  # ==========================================
  # Job 4: Security Scanning
  # ==========================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-extended,security-and-quality

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"

      - name: Run OWASP Dependency Check
        run: |
          mvn -B dependency-check:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressionFiles=dependency-check-suppressions.xml

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: target/dependency-check-report.html

  # ==========================================
  # Job 5: Build & Package
  # ==========================================
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, integration-tests]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build Application
        run: |
          mvn -B clean package -DskipTests \
            -Dproject.build.finalName=temperature-proxy-api

      - name: Build Docker Image
        run: |
          docker build -t temperature-proxy-api:${{ github.sha }} .
          docker tag temperature-proxy-api:${{ github.sha }} temperature-proxy-api:latest

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: temperature-proxy-api:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            target/*.jar
            Dockerfile
            k8s/

  # ==========================================
  # Job 6: Performance Tests
  # ==========================================
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Start Application
        run: |
          java -jar target/temperature-proxy-api-*.jar &
          sleep 30
          curl --retry 10 --retry-delay 5 --retry-connrefused \
            http://localhost:8080/actuator/health || exit 1

      - name: Run JMeter Tests
        uses: rbhadti94/apache-jmeter-action@v0.7.0
        with:
          testFilePath: src/test/jmeter/load-test.jmx
          outputReportsFolder: reports/

      - name: Upload Performance Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-test-results
          path: reports/

  # ==========================================
  # Job 7: Publish Metrics
  # ==========================================
  publish-metrics:
    name: Publish Metrics
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: Generate Metrics Report
        run: |
          echo "# Build Metrics Report" > metrics-report.md
          echo "## Test Results" >> metrics-report.md
          echo "- Unit Tests: $(find unit-test-results -name '*.xml' | wc -l) test files" >> metrics-report.md
          echo "- Integration Tests: $(find integration-test-results -name '*.xml' | wc -l) test files" >> metrics-report.md
          echo "## Coverage" >> metrics-report.md
          cat unit-test-results/site/jacoco/index.html | grep -oP 'Total[^%]+%' >> metrics-report.md || true
          
      - name: Upload Metrics Report
        uses: actions/upload-artifact@v4
        with:
          name: metrics-report
          path: metrics-report.md

  # ==========================================
  # Job 8: Deploy to Staging (on main branch)
  # ==========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, security-scan, performance-tests]
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.temperature-proxy.example.com
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Deploy to Kubernetes
        run: |
          echo "Deploying to staging environment..."
          kubectl apply -f k8s/deployment.yaml
          kubectl rollout status deployment/temperature-proxy

  # ==========================================
  # Job 9: Release (on tag push)
  # ==========================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build-artifacts/*.jar
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker Image to Registry
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push temperature-proxy-api:${{ github.sha }}
          docker push temperature-proxy-api:latest
