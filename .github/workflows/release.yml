name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  JAVA_VERSION: '17'

jobs:
  release:
    name: Build And Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build release artifact
        run: mvn -B clean verify

      - name: Prepare release bundle
        run: |
          version="${GITHUB_REF_NAME}"
          jar_path="$(find target -maxdepth 1 -type f -name '*.jar' ! -name 'original-*.jar' | head -n 1)"
          test -n "${jar_path}"

          bundle_dir="dist/temperature-proxy-api-${version}"
          mkdir -p "${bundle_dir}"
          cp "${jar_path}" "${bundle_dir}/"
          cp README.md Dockerfile "${bundle_dir}/"
          cp -R k8s "${bundle_dir}/"

          tar -czf "dist/temperature-proxy-api-${version}.tar.gz" -C dist "temperature-proxy-api-${version}"

          sha256sum "${jar_path}" "dist/temperature-proxy-api-${version}.tar.gz" \
            > "dist/temperature-proxy-api-${version}.sha256"

      - name: Sign release assets
        env:
          RELEASE_SIGNING_CERT_B64: ${{ secrets.RELEASE_SIGNING_CERT_B64 }}
          RELEASE_SIGNING_KEY_B64: ${{ secrets.RELEASE_SIGNING_KEY_B64 }}
        run: |
          version="${GITHUB_REF_NAME}"
          jar_path="$(find target -maxdepth 1 -type f -name '*.jar' ! -name 'original-*.jar' | head -n 1)"
          cert_path="dist/release-signing-cert.pem"
          key_path="dist/release-signing-key.pem"
          signature_path="dist/temperature-proxy-api-${version}.sha256.sig"

          if [ -z "${RELEASE_SIGNING_CERT_B64}" ] || [ -z "${RELEASE_SIGNING_KEY_B64}" ]; then
            echo "No self-signed release keypair configured; publishing unsigned assets with checksums only."
            exit 0
          fi

          printf '%s' "${RELEASE_SIGNING_CERT_B64}" | base64 --decode > "${cert_path}"
          printf '%s' "${RELEASE_SIGNING_KEY_B64}" | base64 --decode > "${key_path}"

          openssl dgst -sha256 -sign "${key_path}" \
            -out "${signature_path}" \
            "dist/temperature-proxy-api-${version}.sha256"

          chmod 600 "${key_path}"
          rm -f "${key_path}"

      - name: Upload release bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ github.ref_name }}
          if-no-files-found: error
          retention-days: 30
          path: |
            target/*.jar
            dist/temperature-proxy-api-${{ github.ref_name }}.tar.gz
            dist/temperature-proxy-api-${{ github.ref_name }}.sha256
            dist/temperature-proxy-api-${{ github.ref_name }}.sha256.sig
            dist/release-signing-cert.pem

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jar_path="$(find target -maxdepth 1 -type f -name '*.jar' ! -name 'original-*.jar' | head -n 1)"
          assets=(
            "${jar_path}"
            "dist/temperature-proxy-api-${GITHUB_REF_NAME}.tar.gz"
            "dist/temperature-proxy-api-${GITHUB_REF_NAME}.sha256"
          )

          if [ -f "dist/temperature-proxy-api-${GITHUB_REF_NAME}.sha256.sig" ]; then
            assets+=(
              "dist/temperature-proxy-api-${GITHUB_REF_NAME}.sha256.sig"
              "dist/release-signing-cert.pem"
            )
          fi

          gh release create "${GITHUB_REF_NAME}" \
            "${assets[@]}" \
            --generate-notes \
            --verify-tag
