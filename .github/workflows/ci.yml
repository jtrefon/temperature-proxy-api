name: Continuous Integration

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

env:
  JAVA_VERSION: '17'

jobs:
  verify:
    name: Verify Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verify
        run: mvn -B clean verify

      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage-reports
          if-no-files-found: warn
          retention-days: 30
          path: |
            target/surefire-reports/
            target/failsafe-reports/
            target/site/jacoco/

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run Checkstyle and SpotBugs
        run: mvn -B checkstyle:check spotbugs:check

      - name: Upload static analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          if-no-files-found: warn
          retention-days: 30
          path: |
            target/checkstyle-result.xml
            target/spotbugsXml.xml

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Cache Dependency-Check data
        id: dependency_check_cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: dependency-check-${{ runner.os }}-${{ env.JAVA_VERSION }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            dependency-check-${{ runner.os }}-${{ env.JAVA_VERSION }}-

      - name: Run OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          DEPENDENCY_CHECK_CACHE_HIT: ${{ steps.dependency_check_cache.outputs.cache-hit }}
        run: |
          if [ -n "${NVD_API_KEY}" ]; then
            mvn -B dependency-check:check
          elif [ "${DEPENDENCY_CHECK_CACHE_HIT}" = "true" ]; then
            mvn -B dependency-check:check -Dautoupdate=false
          else
            {
              echo "## Dependency Scan Skipped"
              echo
              echo "No \`NVD_API_KEY\` secret is configured and no cached Dependency-Check database was available."
              echo "Skipping the cold-start NVD sync to avoid an infrastructure-driven false negative on a fresh GitHub runner."
              echo "Configure \`NVD_API_KEY\` to enable deterministic dependency scanning from the first run."
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload dependency scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          if-no-files-found: warn
          retention-days: 30
          path: |
            target/dependency-check-report.html
            target/dependency-check-report.json
